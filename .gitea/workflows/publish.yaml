name: Docker Buildname: Docker Build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: docker

    container:
      image: node:20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build docker image
        run: docker build -t myapp:latest .

      - name: Show images
        run: docker images

